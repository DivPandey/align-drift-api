<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Align Drift — Calm precision</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="ambient-bg"></div>
  <main class="game-wrap">
    <header class="header">
      <h1 class="title">Align Drift</h1>
      <p class="subtitle">Slide shapes toward the glow. No rush, no score.</p>
    </header>
    <div class="canvas-wrap">
      <canvas id="game"></canvas>
    </div>
    <footer class="footer">
      <span class="hint">Drag shapes toward magnetic zones — they'll gently snap when close.</span>
    </footer>
  </main>
  <script src="config.js"></script>
  <script src="game.js"></script>
</body>
</html>
